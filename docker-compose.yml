services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meu-saldo-certo-app
    restart: unless-stopped
    ports:
      - "8000:80"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - meu-saldo-certo

  mysql:
    image: mysql:8.0
    container_name: meu-saldo-certo-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-meu_saldo_certo}
      MYSQL_USER: ${DB_USERNAME:-meu_saldo_certo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - meu-saldo-certo

networks:
  meu-saldo-certo:
    driver: bridge

volumes:
  mysql_data:
    driver: local
